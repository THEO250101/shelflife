<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1a3322" stroke="#2a4a32" stroke-width="2"/>
  <!-- Inner warm circle -->
  <circle cx="60" cy="60" r="48" fill="url(#grad)" opacity="0.9"/>
  <!-- Leaf shape -->
  <path d="M58 28 C58 28 32 52 38 72 C42 82 54 88 60 88 C52 82 52 68 58 58 C64 48 80 40 88 36 C80 40 68 48 62 54 C60 56 58 28 58 28Z"
        fill="#f2c94c" opacity="0.95"/>
  <!-- Clock arc -->
  <path d="M48 55 A20 20 0 0 1 78 38" stroke="#f2c94c" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Clock hand -->
  <line x1="60" y1="52" x2="60" y2="40" stroke="#f2c94c" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="52" x2="70" y2="46" stroke="#f2c94c" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Gradients -->
  <defs>
    <radialGradient id="grad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#2a5535"/>
      <stop offset="100%" stop-color="#142418"/>
    </radialGradient>
  </defs>
</svg>
